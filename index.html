<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Aryan 🎉</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

.screen {
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.active { display:flex; }

button {
  padding:10px 20px;
  font-size:18px;
  cursor:pointer;
}

.curtain {
  position:fixed;
  top:0;
  width:50%;
  height:100%;
  background:red;
  transition:1s;
}

.left { left:0; }
.right { right:0; }

.open-left { transform:translateX(-100%); }
.open-right { transform:translateX(100%); }

img {
  width:200px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="screen1" class="screen active">
  <h1>Would you like to enter Aryan’s birthday? 🎂</h1>
  <button onclick="start()">Enter</button>
</div>

<div id="leftCurtain" class="curtain left"></div>
<div id="rightCurtain" class="curtain right"></div>

<div id="screen2" class="screen">
  <h1>Make a wish 🎂</h1>
  <button onclick="next()">Blow Candle</button>
</div>

<div id="screen3" class="screen">
  <h1>🎉 Happy 18th Birthday Aryan 🎉</h1>
  <p>Your message here ❤️</p>

  <img src="photo1.jpg">
  <img src="photo2.jpg">
</div>

<script>
function start() {
  document.getElementById("screen1").classList.remove("active");

  document.getElementById("leftCurtain").classList.add("open-left");
  document.getElementById("rightCurtain").classList.add("open-right");

  setTimeout(() => {
    document.getElementById("screen2").classList.add("active");
  }, 1000);
}

function next() {
  document.getElementById("screen2").classList.remove("active");
  document.getElementById("screen3").classList.add("active");
}
</script>

</body>
</html>
