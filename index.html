<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Aryan 🎉</title>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:'Comic Sans MS', cursive;
  text-align:center;
  overflow:hidden;
}

/* Center layout */
.container {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* Cake */
.cake {
  font-size:90px;
  animation: float 2s infinite ease-in-out;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Candles */
.candles {
  font-size:40px;
  transition:opacity 1s;
}

/* Countdown */
#count {
  font-size:70px;
  margin-top:20px;
}

/* Hidden */
.hidden {
  display:none;
}

/* Zoom animation */
.zoom {
  animation: zoomIn 1.5s ease forwards;
}

@keyframes zoomIn {
  0% { transform:scale(0); opacity:0; }
  100% { transform:scale(1); opacity:1; }
}

/* Glow text */
.glow {
  font-size:45px;
  color:#fff;
  text-shadow: 0 0 10px pink, 0 0 20px hotpink, 0 0 40px red;
}

/* Typing effect */
#typed {
  border-right:3px solid white;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation: typing 4s steps(40,end) forwards, blink 0.7s infinite;
}

@keyframes typing {
  from { width:0 }
  to { width:100% }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* Images */
img {
  width:180px;
  margin:10px;
  border-radius:15px;
  animation: float 3s infinite;
}

/* Confetti */
.confetti {
  position:fixed;
  width:10px;
  height:10px;
  background:red;
  top:0;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}

/* Hearts */
.heart {
  position:fixed;
  color:pink;
  font-size:20px;
  animation: rise 4s linear forwards;
}

@keyframes rise {
  to {
    transform: translateY(-100vh);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- Cake Scene -->
  <div id="cakeScene">
    <div class="cake">🎂</div>
    <div id="candles" class="candles">🕯️ 🕯️ 🕯️</div>
    <div id="count"></div>
  </div>

  <!-- Final Scene -->
  <div id="final" class="hidden">
    <div class="glow">🎉 Happy 18th Birthday Aryan 🎉</div>
    <p id="typed">You are amazing. Stay happy always ❤️</p>
    <img src="photo1.jpg">
    <img src="photo2.jpg">
  </div>

</div>

<!-- Music -->
<audio id="music" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
let count = 3;

function startCountdown() {
  document.getElementById("count").innerText = count;

  let interval = setInterval(() => {
    count--;
    document.getElementById("count").innerText = count;

    if(count === 0) {
      clearInterval(interval);

      // Blow effect
      document.getElementById("candles").style.opacity = 0;

      setTimeout(() => {
        document.getElementById("cakeScene").style.display = "none";

        let final = document.getElementById("final");
        final.classList.remove("hidden");
        final.classList.add("zoom");

        startEffects();

      }, 1000);
    }

  }, 1000);
}

/* Confetti */
function createConfetti() {
  for(let i=0;i<100;i++){
    let c = document.createElement("div");
    c.className="confetti";
    c.style.left = Math.random()*100+"vw";
    c.style.background = ["red","yellow","blue","green","pink"][Math.floor(Math.random()*5)];
    c.style.animationDuration = (2+Math.random()*3)+"s";
    document.body.appendChild(c);
  }
}

/* Hearts */
function createHearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerText="💖";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),4000);
  },300);
}

/* Start everything */
function startEffects(){
  document.getElementById("music").play();
  createConfetti();
  createHearts();
}

startCountdown();
</script>

</body>
</html>
