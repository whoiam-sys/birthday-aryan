<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday Aryan</title>
<style>
body {
  margin:0;
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}
.screen { display:none; height:100vh; justify-content:center; align-items:center; flex-direction:column;}
.active { display:flex; }
button { padding:10px 20px; font-size:18px; cursor:pointer; }

.curtain {
  position:fixed;
  top:0;
  width:50%;
  height:100%;
  background:red;
  transition:1s;
}
.left { left:0; }
.right { right:0; }

.open-left { transform:translateX(-100%); }
.open-right { transform:translateX(100%); }
</style>
</head>

<body>

<div id="s1" class="screen active">
<h1>Enter Aryan's Birthday?</h1>
<button onclick="start()">Enter</button>
</div>

<div id="left" class="curtain left"></div>
<div id="right" class="curtain right"></div>

<div id="s2" class="screen">
<h1>Make a wish 🎂</h1>
<button onclick="next()">Blow Candle</button>
</div>

<div id="s3" class="screen">
<h1>🎉 Happy 18 Aryan 🎉</h1>
<p>Your message here ❤️</p>
<img src="photo1.jpg" width="200">
<img src="photo2.jpg" width="200">
</div>

<script>
function start(){
  document.getElementById('s1').classList.remove('active');
  document.getElementById('left').classList.add('open-left');
  document.getElementById('right').classList.add('open-right');

  setTimeout(()=>{
    document.getElementById('s2').classList.add('active');
  },1000);
}

function next(){
  document.getElementById('s2').classList.remove('active');
  document.getElementById('s3').classList.add('active');
}
</script>

</body>
</html>
